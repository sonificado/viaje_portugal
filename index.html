<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruta Agosto 2026 · Redován → Mérida → Lisboa → Oporto → Salamanca → Redován</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-label">Viaje · Agosto 2026</div>
    <h1 class="hero-title">La <em>Gran Ruta</em><br>por la Península</h1>
    <p class="hero-sub">7 días · 5 ciudades · Kilómetros de historia</p>
    <div class="route-bar">
      <span class="route-city" onclick="showDay(1)">Redován</span>
      <span class="route-arrow">→</span>
      <span class="route-city" onclick="showDay(1)">Mérida</span>
      <span class="route-arrow">→</span>
      <span class="route-city" onclick="showDay(2)">Lisboa</span>
      <span class="route-arrow">→</span>
      <span class="route-city" onclick="showDay(5)">Oporto</span>
      <span class="route-arrow">→</span>
      <span class="route-city" onclick="showDay(7)">Salamanca</span>
      <span class="route-arrow">→</span>
      <span class="route-city" onclick="showDay(8)">Redován</span>
    </div>
  </div>
</div>

<!-- DAY NAV -->
<div class="day-nav-wrapper">
  <div class="day-nav" id="day-nav">
    <!-- Day buttons will be generated by JavaScript -->
  </div>
</div>

<div class="main" id="main-content">
  <!-- Day content will be generated by JavaScript -->
</div>

<footer>
  Precios orientativos · Verificar disponibilidad y horarios antes del viaje · Agosto 2026
</footer>

<script src="js/main.js"></script>
</body>
</html>
